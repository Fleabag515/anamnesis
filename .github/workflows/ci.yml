name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint
        # ESLint is advisory on Node 18 because some new rules need newer parsers
        continue-on-error: ${{ matrix.node-version == '18.x' }}

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test
        env:
          ANAMNESIS_LOG: warn
